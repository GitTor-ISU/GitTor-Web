<div class="flex h-full min-h-0 flex-col gap-4 p-4">
  <label class="text-lg font-semibold">Repository Settings</label>
  @if (repositories.length === 0) {
    <div class="-mt-16 flex flex-1 items-center justify-center">
      <z-empty
        zTitle="No Repos Yet"
        zDescription="You haven't created any repositories. Get started by creating your first!"
        [zIcon]="folderGitIcon"
        [zActions]="[actionPrimary]"
      >
        <ng-template #actionPrimary>
          <button type="button" z-button>Create Repo</button>
        </ng-template>
      </z-empty>
    </div>
  } @else {
    <div class="mb-4 flex flex-col gap-3">
      <label z-form-label>Select a repository:</label>
      <z-combobox
        placeholder="Select repository..."
        searchPlaceholder="Search"
        emptyText="No repository found."
        [options]="repositoryOptions()"
        [(value)]="selectedValue"
        (zComboSelected)="onRepositoryChange($event.value)"
      />
    </div>
    <div class="flex max-w-sm flex-col gap-4">
      <form
        class="flex flex-col gap-6 text-sm md:flex-row md:items-start md:gap-16"
        [formGroup]="form"
        (ngSubmit)="onSubmit()"
      >
        <div class="flex min-w-0 flex-1 flex-col gap-6 md:max-w-3xl">
          <z-form-field class="w-full">
            <label z-form-label>Name</label>
            <z-form-control [helpText]="this.form.controls.name.value ? nameHelpMessage() : ''">
              <input
                z-input
                type="text"
                formControlName="name"
                data-test="settings-repository-name"
                appEmptyToNull
                [placeholder]="repository().name"
              />
            </z-form-control>
          </z-form-field>
          <z-form-field class="w-full">
            <label z-form-label>About</label>
            <z-form-control [helpText]="this.form.controls.about.value ? aboutHelpMessage() : ''">
              <textarea
                z-input
                type="text"
                formControlName="about"
                data-test="settings-repository-about"
                appEmptyToNull
                [placeholder]="repository().about"
              ></textarea>
            </z-form-control>
          </z-form-field>
        </div>
      </form>
      <z-segmented [zOptions]="visibilityOptions" [(selectedValue)]="visibility" (zChange)="updateVisibility($event)" />
      <z-button zType="destructive" class="mt-1 max-w-[145px]" (click)="onDeleteRepo()">Delete Repository</z-button>
    </div>
  }
</div>
