<div class="w-full" [style.height.px]="zData.$hideFooter() ? 552 : 500">
  <z-tab-group
    class="h-full"
    [zTabsPosition]="tabsPosition()"
    [zDeselect]="onDeselected"
    [(zActiveTabIndex)]="activeTabIndex"
    (zTabChange)="activeTab?.form?.reset()"
  >
    <z-tab label="Profile">
      <app-profile />
    </z-tab>
    <z-tab label="Repository">
      <p>Content of the second tab</p>
    </z-tab>
    <z-tab label="GPG">
      <p>Content of the third tab</p>
    </z-tab>
  </z-tab-group>
</div>
