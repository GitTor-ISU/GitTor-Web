<div class="flex min-h-screen flex-col items-center p-6">
  <div class="w-full max-w-3xl">
    <div class="bg-background px-6">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-bold">Create a new repository</h1>
          <p class="text-muted-foreground text-sm">Upload a .torrent file to share a repository on the network.</p>
        </div>
      </div>
    </div>

    <z-divider />

    <form class="flex flex-col gap-6 px-6 py-4 text-sm" [formGroup]="form" (ngSubmit)="onSubmit()">
      <z-form-field class="w-full">
        <label z-form-label>Repository name</label>
        <z-form-control [helpText]="form.controls.name.value ? nameHelpMessage() : ''">
          <input
            z-input
            type="text"
            formControlName="name"
            data-test="repository-upload-name"
            appEmptyToNull
            placeholder="awesome-project"
          />
        </z-form-control>
      </z-form-field>

      <z-form-field class="w-full">
        <label z-form-label>Description <span class="text-muted-foreground">(optional)</span></label>
        <z-form-control [helpText]="form.controls.description.value ? descriptionHelpMessage() : ''">
          <textarea
            z-input
            formControlName="description"
            data-test="repository-upload-description"
            appEmptyToNull
            placeholder="A short description of this repository"
            rows="3"
          ></textarea>
        </z-form-control>
      </z-form-field>

      <z-form-field class="w-full">
        <label z-form-label>Torrent file</label>
        <div class="flex items-center gap-3">
          <button z-button type="button" zType="secondary" class="gap-2" (click)="fileUpload.click()">
            <lucide-angular class="size-4" [img]="uploadIcon" />
            Choose .torrent file
          </button>
          <span class="text-muted-foreground text-sm" data-test="repository-upload-file-name">
            {{ fileName() || 'No file selected' }}
          </span>
          <input
            #fileUpload
            type="file"
            class="hidden"
            accept=".torrent,application/x-bittorrent"
            data-test="repository-upload-file-input"
            (change)="onFileSelected($event)"
          />
        </div>
      </z-form-field>

      @if (errorMessage()) {
        <p class="text-destructive text-sm">{{ errorMessage() }}</p>
      }

      <div class="flex items-center gap-2">
        <button
          z-button
          type="submit"
          zType="default"
          data-test="repository-upload-submit"
          [zDisabled]="isInvalid() || submitting()"
        >
          {{ submitting() ? 'Uploading...' : 'Create repository' }}
        </button>
        <a z-button zType="outline" [routerLink]="`/${username()}`">Cancel</a>
      </div>
    </form>
  </div>
</div>
